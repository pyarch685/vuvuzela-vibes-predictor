name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: https://api.pslpredictor.com
        run: npm run build

      - name: Discover correct account ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "--- accounts the token has access to ---"
          curl -sS "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | python3 -c "import json,sys;d=json.load(sys.stdin);print(json.dumps([{'id':a['id'],'name':a['name']} for a in d.get('result',[])],indent=2));print('success:',d.get('success'));print('errors:',d.get('errors'))"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3.114.14 pages deploy dist --project-name=pslpredictor --branch=main --commit-dirty=true
