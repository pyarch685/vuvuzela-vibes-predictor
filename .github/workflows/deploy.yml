name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: https://api.pslpredictor.com
        run: npm run build

      - name: Inspect secret (non-leaky)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token length: ${#CLOUDFLARE_API_TOKEN}"
          echo "token prefix (first 4): ${CLOUDFLARE_API_TOKEN:0:4}"
          echo "token ends-with-whitespace? [$(echo -n "${CLOUDFLARE_API_TOKEN: -1}" | xxd -p)]"
          echo "token sha256: $(echo -n "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -c1-16)"
          echo "account length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "account sha256: $(echo -n "$CLOUDFLARE_ACCOUNT_ID" | sha256sum | cut -c1-16)"
          echo "--- direct API probe (bypasses wrangler) ---"
          curl -sS "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 500
          echo ""
          curl -sS "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 500

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3.114.14 pages deploy dist --project-name=pslpredictor --branch=main --commit-dirty=true
